# Build & publish the ClosedMesh desktop bundles (.dmg, .msi, .AppImage, .deb)
# whenever a normal app release tag (`v*`) is pushed.
#
# Trigger:
#     git tag v0.1.0 && git push origin v0.1.0
#
# Output: a GitHub Release named "ClosedMesh Desktop v0.1.0" with one asset
# per platform variant:
#
#     ClosedMesh_0.1.0_aarch64.dmg          (Apple Silicon)
#     ClosedMesh_0.1.0_x64.dmg              (Intel Mac)
#     ClosedMesh_0.1.0_x64-setup.exe        (Windows NSIS)
#     ClosedMesh_0.1.0_x64_en-US.msi        (Windows MSI)
#     closedmesh_0.1.0_amd64.deb            (Debian / Ubuntu)
#     closedmesh_0.1.0_amd64.AppImage       (universal Linux)
#     latest.json                           (Tauri auto-updater manifest)
#
# Desktop app releases are mainline releases. Do not use `desktop-v*` or
# prerelease/candidate tag names; fix forward with the next real version if a
# not-yet-launched release needs correction.

name: Desktop release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        type: string

# tauri-action needs `contents: write` on the repo to create releases and
# upload binary assets. Everything else stays read-only.
permissions:
  contents: write

# A given commit can only have one in-flight desktop release at a time;
# subsequent pushes cancel earlier in-progress runs to avoid releases
# stomping on each other.
concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

# Force bash for `run:` steps on every runner. The two sidecar staging
# scripts are bash, and on the Windows runner the default shell is
# PowerShell, which silently dot-sources the .sh file as PowerShell and
# exits 0 without ever running it — that was the v0.1.2 Windows failure
# (the Node sidecar never got written, so the Tauri build complained
# "resource path sidecar\binaries\closedmesh-node-x86_64-pc-windows-msvc.exe doesn't
# exist"). bash is on PATH on all GitHub-hosted runners (Git for Windows
# on the Windows ones).
defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}

    strategy:
      # Don't take the rest of the matrix down if one platform fails — we'd
      # rather ship 4-of-5 platform bundles and fix the broken one in a
      # follow-up than block the whole release on, say, a flaky Windows
      # runner.
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          # macOS Intel (x86_64) was dropped after v0.1.1 — the macos-13
          # runner pool has multi-hour queue times now that Apple Silicon
          # has replaced Intel in the entire current Mac lineup. If/when
          # we have a paying user on a pre-2021 Intel Mac we'll bring it
          # back as a universal binary built on macos-14 instead.
          - label: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          - label: Linux x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            package-lock.json

      # Order matters: stage the Next.js controller BEFORE we let
      # Swatinem/rust-cache restore desktop/target/ to disk. Next.js
      # standalone tracing currently falls back to "trace the whole
      # project" because of dynamic fs/spawn calls in some control
      # routes, and if a 300+ MB compiled Rust target dir is sitting in
      # the workspace at trace time, all of it gets slurped into
      # .next/standalone/ → ClosedMesh.app. That's exactly how the v0.1.12
      # macOS DMG ballooned from 50 MB to 352 MB. Staging first keeps
      # desktop/target/ off disk until after the Next build is done.
      #
      # Linux build deps live above the Rust setup too because they're
      # apt-only (no Rust dep).
      - name: Install Linux build deps
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # Phase 8b — bundle the Next.js controller as a Tauri sidecar so the
      # downloaded .dmg / .msi / .AppImage / .deb is self-sufficient and
      # the user doesn't have to run a separate curl-bash to install the
      # controller. See desktop/SIDECAR.md.
      - name: Stage controller bundle (npm ci + next build standalone)
        run: ./desktop/scripts/stage-controller.sh
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Fetch Node.js sidecar binary for ${{ matrix.target }}
        run: ./desktop/scripts/fetch-node.sh --target ${{ matrix.target }}

      # Sanity-check the fetched sidecar before handing off to tauri-action.
      # If this is missing tauri-action fails much later with an opaque
      # "resource path doesn't exist" error; failing loudly here makes the
      # cause obvious.
      - name: Verify Node sidecar binary present
        run: |
          set -euo pipefail
          target='${{ matrix.target }}'
          case "$target" in
            x86_64-pc-windows-msvc) ext='.exe' ;;
            *)                      ext='' ;;
          esac
          # 0.1.69+ ships the sidecar as `closedmesh-node-<triple>` so
          # the installed image name is unique to us (avoids killing
          # the user's other node.exe processes during install upgrade).
          path="desktop/sidecar/binaries/closedmesh-node-${target}${ext}"
          if [[ ! -f "$path" ]]; then
            echo "::error::missing $path after fetch-node step"
            ls -la desktop/sidecar/binaries/ || true
            exit 1
          fi
          ls -la "$path"

      # Now safe to bring in Rust + the (potentially large) cargo cache:
      # the controller bundle is already staged, so anything restored
      # under desktop/target/ won't end up inside .next/standalone/.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop -> target
          # Bump this if you ever need to bust the cache (e.g. weird linker
          # state after a Rust toolchain update).
          prefix-key: 'desktop-v1'

      - name: Install desktop npm deps
        working-directory: desktop
        run: npm ci --no-fund --no-audit

      - name: Generate platform icons
        working-directory: desktop
        run: npm run icons

      # Belt + suspenders: if anything still leaked into the staged
      # controller bundle, fail the build loudly here rather than ship a
      # 350 MB DMG. The 0.1.11 macOS bundle was 40 MB; 0.1.12 was 868 MB
      # (300 MB of stray Rust target artifacts). 200 MB is well above any
      # legitimate growth path and well below the regression.
      - name: Guard staged controller size (<= 200 MB)
        run: |
          set -euo pipefail
          stage="desktop/sidecar/controller"
          if [[ ! -d "$stage" ]]; then
            echo "::error::expected $stage to exist after staging"; exit 1
          fi
          size_kb=$(du -sk "$stage" | awk '{print $1}')
          size_mb=$(( size_kb / 1024 ))
          echo "Staged controller size: ${size_mb} MB"
          if (( size_mb > 200 )); then
            echo "::error::staged controller is ${size_mb} MB, refusing (NFT regression?)"
            du -sh "$stage"/* | sort -h | tail -20
            exit 1
          fi

      - name: Build & upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOSEDMESH_RUNTIME_TOKEN: ${{ secrets.CLOSEDMESH_RUNTIME_TOKEN }}
        with:
          # Cargo workspace lives in desktop/, not the repo root.
          projectPath: desktop
          # Re-use whatever tag triggered the workflow (or the manual
          # workflow_dispatch input); tauri-action creates / appends to a
          # release with this tag name.
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'ClosedMesh Desktop ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: |
            ## ClosedMesh Desktop ${{ github.event.inputs.tag || github.ref_name }}

            Cross-platform desktop shell for ClosedMesh — wraps the chat UI in
            a native window with a system-tray pill, live node count, and
            one-click Start/Stop for the runtime.

            **Pick your platform:**
            - **macOS (Apple Silicon, M1+):** `ClosedMesh_*_aarch64.dmg`
            - **Windows 10/11:** `ClosedMesh_*_x64-setup.exe` (recommended) or `.msi`
            - **Linux (Debian / Ubuntu):** `*_amd64.deb`
            - **Linux (everything else):** `*_amd64.AppImage` (`chmod +x` and run)

            (Pre-2021 Intel Macs aren't shipped pre-built; you can still
            build from source with `cd desktop && ./scripts/build.sh`.)

            **First launch on macOS:** double-click → "Done" on the
            "unidentified developer" dialog → System Settings → Privacy
            & Security → "Open Anyway" next to the ClosedMesh notice.
            (We ad-hoc sign the bundle, so it goes through the normal
            Gatekeeper bypass; we're working on full notarization.)

            **First launch on Windows:** the SmartScreen filter says
            "Windows protected your PC" — click "More info" → "Run
            anyway".

            The runtime (`closedmesh` CLI) installs separately via the curl /
            PowerShell one-liner from https://closedmesh.com.
          releaseDraft: false
          prerelease: false
          # Forward platform-specific args (the `--target` flag for macOS
          # arm64 vs Intel) into `cargo tauri build`.
          args: ${{ matrix.args }}
          # Tauri-action picks an appropriate updater bundle; we keep
          # bundling for everything so the auto-updater plugin can ship
          # later without re-tagging.
          includeUpdaterJson: true
