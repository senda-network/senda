<?xml version="1.0" encoding="UTF-8"?>
<!--
  Source-of-truth icon for Senda.app / Senda.msi / Senda.AppImage.

  scripts/svg-to-png.mjs rasterizes this SVG to icons/source.png at 1024x1024,
  then `tauri icon` fans the PNG out into all the per-platform variants the
  bundler needs (icon.icns, icon.ico, 32x32.png, 128x128.png, 128x128@2x.png,
  plus the Windows MS Store tile sizes). The same script also emits the web
  favicon / apple-touch-icon / PWA PNGs and copies this file to app/icon.svg —
  so this is the single rebrand point for every square Senda mark.

  Design mirrors app/components/Logo.tsx: a leaf whose midrib and veins branch
  like routes across a network, with three waypoint nodes at the vein tips.
  "Senda" is Spanish for path/trail; the leaf is the living trail a session
  takes as it hops across peers in the mesh, and the three nodes echo the
  original mesh mark. Leaf + path + mesh all read at once.

  Colours match the accent token in app/globals.css. The tile is deep pine
  (trail green, not eco-lime). If you rebrand, change this file, Logo.tsx, and
  app/opengraph-image.tsx together, then run `npm run icons` in desktop/.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1f9a5f"/>
      <stop offset="100%" stop-color="#0b5e38"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="36%" r="62%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#glow)"/>

  <g transform="translate(512 512) scale(39) translate(-11.15 -12.15)">
    <path d="M10.5 21.5 C 3.6 16.8 4.6 7.4 14.4 2.8 C 18.7 8.6 17.1 17.3 10.5 21.5 Z"
          fill="#f4fbf6"/>
    <path d="M10.5 20.3 C 12.2 15 12 8.5 14 4"
          fill="none" stroke="#0b5e38" stroke-width="1" stroke-linecap="round" stroke-opacity="0.6"/>
    <path d="M11.7 16 L15.3 13.8 M12.4 11.5 L16 9.2 M12 13.8 L8.2 12 M12.6 9 L9.2 7.2"
          fill="none" stroke="#0b5e38" stroke-width="0.95" stroke-linecap="round" stroke-opacity="0.55"/>
    <circle cx="14" cy="3.8" r="0.95" fill="#bff0d4"/>
    <circle cx="16" cy="9.2" r="0.95" fill="#bff0d4"/>
    <circle cx="8.2" cy="12" r="0.95" fill="#bff0d4"/>
  </g>
</svg>
