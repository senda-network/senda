<?xml version="1.0" encoding="UTF-8"?>
<!--
  Source-of-truth icon for Senda.app / Senda.msi / Senda.AppImage.

  scripts/svg-to-png.mjs rasterizes this SVG to icons/source.png at 1024x1024,
  then `tauri icon` fans the PNG out into all the per-platform variants the
  bundler needs (icon.icns, icon.ico, 32x32.png, 128x128.png, 128x128@2x.png,
  plus the Windows MS Store tile sizes).

  Design mirrors app/components/Logo.tsx: the Senda leaf whose veins branch
  like paths across a network. Rendered here as a light leaf on a fresh
  emerald tile so the desktop icon, the menu-bar pill, the website favicon,
  and the in-product header logo all read as the same brand.

  The leaf geometry is identical to Logo.tsx and the accent green matches
  the --accent token in app/globals.css. Keep the three in sync.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#22b06e"/>
      <stop offset="100%" stop-color="#0e7245"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#glow)"/>

  <g transform="translate(512 512) scale(34) translate(-12 -12)">
    <path
      d="M12 22 C5.5 17 4.8 8.8 12 2 C19.2 8.8 18.5 17 12 22 Z"
      fill="#f4fbf6"/>
    <path
      d="M12 21 L12 4.5 M12 15.5 L7.6 12.8 M12 15.5 L16.4 12.8 M12 10.5 L8.7 8.2 M12 10.5 L15.3 8.2"
      stroke="#0e7245"
      stroke-width="0.62"
      stroke-linecap="round"
      stroke-opacity="0.75"
      fill="none"/>
  </g>
</svg>
